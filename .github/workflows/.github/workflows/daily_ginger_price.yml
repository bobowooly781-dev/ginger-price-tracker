name: Daily Ginger Price

on:
  schedule:
    # Runs every weekday at 08:00 SAST (06:00 UTC)
    - cron: "0 6 * * 1-5"
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Needed to commit the updated CSV back

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_ginger.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.csv
          git diff --cached --quiet || git commit -m "Add ginger price $(date +'%Y-%m-%d')"
          git push
